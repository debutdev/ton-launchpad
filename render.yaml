services:
  - type: web
    name: tonked-live-events
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run live-events
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LIVE_EVENTS_SECRET
        sync: false
  - type: web
    name: tonked-indexer
    runtime: node
    plan: free
    buildCommand: npm install --include=dev
    startCommand: npm run indexer
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_FACTORY_ADDRESS
        sync: false
      - key: TON_NETWORK
        value: mainnet
      - key: TONCENTER_ENDPOINT
        value: https://toncenter.com/api/v2/jsonRPC
      - key: TONAPI_ENDPOINT
        value: https://tonapi.io
      - key: DEDUST_FACTORY_ADDRESS
        value: EQBfBWT7X2BHg9tXAxzhz2aKiNTU1tpt5NsiK0uSDW_YAJ67
      - key: PLATFORM_WALLET
        sync: false
      - key: PLATFORM_WALLET_MNEMONIC
        sync: false
      - key: AUTO_SWEEP_FEES_ENABLED
        value: "false"
      - key: AUTO_SWEEP_MIN_FEE_TOKENS
        value: "1000"
      - key: AUTO_SWEEP_TX_VALUE_TON
        value: "0.4"
      - key: AUTO_SWEEP_FORWARD_TON
        value: "0.25"
      - key: AUTO_SWEEP_MAX_SPEND_TON
        value: "0.5"
      - key: AUTO_SWEEP_MIN_PLATFORM_TON
        value: "0.5"
      - key: AUTO_SWEEP_COOLDOWN_MS
        value: "120000"
      - key: AUTO_SWEEP_BALANCE_RETRY_MS
        value: "3600000"
      - key: AUTO_SWEEP_SCAN_INTERVAL_MS
        value: "180000"
      - key: TONCENTER_API_KEY
        sync: false
      - key: TONAPI_KEY
        sync: false
      - key: TONAPI_WEBHOOK_SECRET
        sync: false
      - key: LIVE_EVENTS_WEBHOOK_URL
        value: https://tonked-live-events.onrender.com/webhook
      - key: LIVE_EVENTS_SECRET
        sync: false
